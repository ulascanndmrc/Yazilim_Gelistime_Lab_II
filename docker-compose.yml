version: '3.8'

services:

  # ─── API Gateway / Dispatcher ─────────────────────────────────────────────
  dispatcher:
    build: ./dispatcher
    container_name: dispatcher
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://dispatcher-db:27017/dispatcher_db
      - JWT_SECRET=super-secret-jwt-key-change-in-prod
      - INTERNAL_API_KEY=internal-api-key-change-in-prod
      - LOGIN_SERVICE_URL=http://login-service:5001
      - MESSAGE_SERVICE_URL=http://message-service:5002
      - USER_SERVICE_URL=http://user-service:5003
      - PRODUCT_SERVICE_URL=http://product-service:5004
      - REPORT_SERVICE_URL=http://report-service:5005
    depends_on:
      - dispatcher-db
      - login-service
      - message-service
      - user-service
      - product-service
      - report-service
    networks:
      - microservices_net
    restart: unless-stopped

  # ─── Login Service ────────────────────────────────────────────────────────
  login-service:
    build: ./login-service
    container_name: login-service
    environment:
      - MONGO_URI=mongodb://login-db:27017/login_db
      - JWT_SECRET=super-secret-jwt-key-change-in-prod
      - INTERNAL_API_KEY=internal-api-key-change-in-prod
      - PORT=5001
    depends_on:
      - login-db
    networks:
      - microservices_net
    restart: unless-stopped

  # ─── Message Service ──────────────────────────────────────────────────────
  message-service:
    build: ./message-service
    container_name: message-service
    environment:
      - MONGO_URI=mongodb://message-db:27017/message_db
      - INTERNAL_API_KEY=internal-api-key-change-in-prod
      - PORT=5002
    depends_on:
      - message-db
    networks:
      - microservices_net
    restart: unless-stopped

  # ─── User Service ─────────────────────────────────────────────────────────
  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      - MONGO_URI=mongodb://user-db:27017/user_db
      - INTERNAL_API_KEY=internal-api-key-change-in-prod
      - PORT=5003
    depends_on:
      - user-db
    networks:
      - microservices_net
    restart: unless-stopped

  # ─── Product Service ──────────────────────────────────────────────────────
  product-service:
    build: ./product-service
    container_name: product-service
    environment:
      - MONGO_URI=mongodb://product-db:27017/product_db
      - INTERNAL_API_KEY=internal-api-key-change-in-prod
      - PORT=5004
    depends_on:
      - product-db
    networks:
      - microservices_net
    restart: unless-stopped

  # ─── Report Service ───────────────────────────────────────────────────────
  report-service:
    build: ./report-service
    container_name: report-service
    environment:
      - MONGO_URI=mongodb://report-db:27017/report_db
      - INTERNAL_API_KEY=internal-api-key-change-in-prod
      - PORT=5005
    depends_on:
      - report-db
    networks:
      - microservices_net
    restart: unless-stopped

  # ─── MongoDB Instances (one per service) ─────────────────────────────────
  dispatcher-db:
    image: mongo:7.0
    container_name: dispatcher-db
    volumes:
      - dispatcher-db-data:/data/db
    networks:
      - microservices_net
    restart: unless-stopped

  login-db:
    image: mongo:7.0
    container_name: login-db
    volumes:
      - login-db-data:/data/db
    networks:
      - microservices_net
    restart: unless-stopped

  message-db:
    image: mongo:7.0
    container_name: message-db
    volumes:
      - message-db-data:/data/db
    networks:
      - microservices_net
    restart: unless-stopped

  user-db:
    image: mongo:7.0
    container_name: user-db
    volumes:
      - user-db-data:/data/db
    networks:
      - microservices_net
    restart: unless-stopped

  product-db:
    image: mongo:7.0
    container_name: product-db
    volumes:
      - product-db-data:/data/db
    networks:
      - microservices_net
    restart: unless-stopped

  report-db:
    image: mongo:7.0
    container_name: report-db
    volumes:
      - report-db-data:/data/db
    networks:
      - microservices_net
    restart: unless-stopped

  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - microservices_net
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - microservices_net
    restart: unless-stopped

networks:
  microservices_net:
    driver: bridge

volumes:
  dispatcher-db-data:
  login-db-data:
  message-db-data:
  user-db-data:
  product-db-data:
  report-db-data:
  grafana-data:
